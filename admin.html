<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《嶋聲》票務專用</title>
    <link rel="icon" type="image/png" href="/NTUCO.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="/admin.css">
</head>
<body class="admin-page">
    <div class="admin-shell">
        <div class="admin-topbar">
            <div class="admin-title-wrap">
                <h1>《嶋聲》票務專用</h1>
                <p>加油加油</p>
            </div>
        
            <div style="display:flex; flex-direction:column; gap:10px;">
        
                <button
                    id="order-open-toggle-btn"
                    type="button"
                    class="order-open-btn"
                >
                    讀取購票狀態中...
                </button>
        
                <a href="/" class="back-link-btn">
                    回到首頁
                </a>
        
                <a href="/edit.html" class="back-link-btn">
                    修改資料
                </a>
        
            </div>
        </div>

        <section class="admin-concert-card" id="admin-concert-card">
            <div>
                <h2>請先選擇場次</h2>
                <p>選擇後才會讀取該場次的訂單資料。</p>
            </div>

            <div class="admin-concert-actions">
                <button class="concert-select-btn" type="button" data-concert="tp">
                    台北場
                </button>
                <button class="concert-select-btn" type="button" data-concert="kh">
                    高雄場
                </button>
            </div>
        </section>

        <div class="admin-work-area hidden" id="admin-work-area">
            <div class="admin-current-concert" id="admin-current-concert">
                目前場次：尚未選擇
            </div>

            <div class="admin-search-card">
                <input
                    id="admin-keyword-input"
                    class="admin-search-input"
                    type="text"
                    placeholder="輸入姓名或訂單ID"
                />
                <button id="admin-search-btn" class="admin-search-btn" type="button">查詢</button>
            </div>

            <div class="admin-table-card">
            <div class="admin-table-scroll">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>訂單日期與時間</th>
                            <th>訂單ID</th>
                            <th>姓名</th>
                            <th>排數</th>
                            <th>座位</th>
                            <th>票價</th>
                            <th>備註</th>
                            <th>鎖定狀態</th>
                            <th>付款狀態</th>
                            <th>取票狀態</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-tbody">
                        <tr>
                            <td colspan="10" class="empty-state">請先選擇場次</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            </div>
        </div>
    </div>

    <script>
        let authed = false;
        let currentConcert = null;
        const concertLabels = {
            tp: "台北場",
            kh: "高雄場"
        };

        function requireConcertSelected() {
            if (currentConcert) return true;
            alert("請先選擇台北場或高雄場");
            return false;
        }

        function buildModeQuery(prefix = "?") {
            if (!currentConcert) return "";
            return `${prefix}mode=${encodeURIComponent(currentConcert)}`;
        }
        
        function showUnauthorized() {
            document.body.innerHTML = `
                <div style="
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: Arial, 'Noto Sans TC', sans-serif;
                    background: linear-gradient(135deg, #5f7f82, #8ea7a3);
                    color: white;
                    font-size: 28px;
                    font-weight: 800;
                ">
                    你不是票務 :(
                </div>
            `;
        }
        
        async function requirePassword() {
            if (sessionStorage.getItem("admin_ok") === "1") {
                authed = true;
                return true;
            }
        
            const input = prompt("請輸入密碼");
            if (!input) {
                showUnauthorized();
                return false;
            }
        
            const res = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: input })
            });
        
            const raw = await res.text();
            console.log("login status:", res.status);
            console.log("login raw:", raw);
        
            let data;
            try {
                data = JSON.parse(raw);
            } catch {
                alert(`登入 API 回傳不是 JSON：${res.status}`);
                showUnauthorized();
                return false;
            }
        
            if (res.ok && data.success) {
                sessionStorage.setItem("admin_ok", "1");
                authed = true;
                return true;
            }
        
            alert(data.message || "你不是票務 :(");
            showUnauthorized();
            return false;
        }

        let currentKeyword = "";

        function escapeHtml(text) {
            return String(text ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function lockButtonHtml(order) {
            if (order.order_status === "locked") {
                return `<button class="pill-btn dark" type="button" onclick="toggleLock('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">鎖定</button>`;
            }
            return `<button class="pill-btn cyan" type="button" onclick="toggleLock('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">開放刪除</button>`;
        }

        function paymentButtonHtml(order) {
            if (order.payment_done) {
                return `<button class="pill-btn green" type="button" onclick="togglePayment('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已付款</button>`;
            }
            return `<button class="pill-btn gray" type="button" onclick="togglePayment('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">未付款</button>`;
        }

        function pickupButtonHtml(order) {
            if (order.picked_up) {
                return `<button class="pill-btn blue" type="button" onclick="advancePickup('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已取</button>`;
            }
        
            if (order.pickup_open) {
                return `<button class="pill-btn green" type="button" onclick="advancePickup('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已開放</button>`;
            }
        
            if (order.ticket_adjusted) {
                return `<button class="pill-btn cyan" type="button" onclick="advancePickup('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已調票</button>`;
            }
        
            return `<button class="pill-btn gray" type="button" onclick="toggleTicketAdjusted('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">未開放</button>`;
        }

        function renderAdminOrders(orders) {
            const tbody = document.getElementById("admin-orders-tbody");
            if (!tbody) return;

            if (!orders.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="empty-state">查無資料</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td class="info-text">${escapeHtml(order.datetime)}</td>
                    <td class="info-text">${escapeHtml(order.order_id)}</td>
                    <td class="info-text">${escapeHtml(order.name)}</td>
                    <td class="info-text">${escapeHtml(order.floor)}${escapeHtml(order.row_label)}排</td>
                    <td class="info-text seats-cell">${order.seats.map(seat => `${seat}`).join("、")}</td>
                    <td class="info-text">$${order.price}</td>
                    <td>
                        <input
                            id="admin-note-${escapeHtml(order.order_id)}"
                            class="note-input"
                            type="text"
                            value="${escapeHtml(order.note || "")}"
                            placeholder="備註"
                        />
                    </td>
                    <td><div class="cell-center">${lockButtonHtml(order)}</div></td>
                    <td><div class="cell-center">${paymentButtonHtml(order)}</div></td>
                    <td><div class="cell-center">${pickupButtonHtml(order)}</div></td>
                </tr>
            `).join("");
        }

        async function searchAdminOrders() {
            if (!authed) return;
            if (!requireConcertSelected()) return;
        
            const input = document.getElementById("admin-keyword-input");
            const keyword = input.value.trim();
        
            currentKeyword = keyword;
        
            const params = new URLSearchParams();
            params.set("mode", currentConcert);
            if (keyword) {
                params.set("keyword", keyword);
            }
        
            const res = await fetch(`/api/admin/orders?${params.toString()}`);
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "查詢失敗");
                return;
            }
        
            renderAdminOrders(data.orders || []);
        }

        async function toggleLock(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/lock` +
                `?mode=${encodeURIComponent(currentConcert)}` +
                `&floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function togglePayment(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/payment` +
                `?mode=${encodeURIComponent(currentConcert)}` +
                `&floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function advancePickup(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/pickup/advance` +
                `?mode=${encodeURIComponent(currentConcert)}` +
                `&floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function toggleTicketAdjusted(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/ticket-adjusted` +
                `?mode=${encodeURIComponent(currentConcert)}` +
                `&floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function deleteOrder(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const ok = confirm("確定要刪除這排座位嗎？");
            if (!ok) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}` +
                `?mode=${encodeURIComponent(currentConcert)}` +
                `&floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "DELETE"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "刪除失敗");
                return;
            }
        
            searchAdminOrders();
        }

        document.getElementById("admin-search-btn").addEventListener("click", searchAdminOrders);
        document.getElementById("admin-keyword-input").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                searchAdminOrders();
            }
        });
    
        function setAdminEmptyState(message) {
            const tbody = document.getElementById("admin-orders-tbody");
            if (!tbody) return;

            tbody.innerHTML = `
                <tr>
                    <td colspan="10" class="empty-state">${escapeHtml(message)}</td>
                </tr>
            `;
        }

        async function selectConcert(concertCode) {
            if (!authed) return;

            currentConcert = concertCode;
            sessionStorage.setItem("admin_concert", concertCode);

            document.querySelectorAll(".concert-select-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.concert === concertCode);
            });

            const workArea = document.getElementById("admin-work-area");
            const label = concertLabels[concertCode] || concertCode;
            document.getElementById("admin-current-concert").textContent = `目前場次：${label}`;
            workArea?.classList.remove("hidden");

            const input = document.getElementById("admin-keyword-input");
            if (input) input.value = currentKeyword || "";

            setAdminEmptyState(`${label}資料載入中...`);
            await loadOrderOpenStatus();
            await searchAdminOrders();
        }

        document.querySelectorAll(".concert-select-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                selectConcert(btn.dataset.concert);
            });
        });

        window.onload = async () => {
            const ok = await requirePassword();
            if (!ok) return;

            setAdminEmptyState("請先選擇台北場或高雄場");

            const savedConcert = sessionStorage.getItem("admin_concert");
            if (savedConcert === "tp" || savedConcert === "kh") {
                selectConcert(savedConcert);
            }
        };

        const toggleBtn = document.getElementById("order-open-toggle-btn");
        
        async function loadOrderOpenStatus() {
            if (!currentConcert) {
                toggleBtn.textContent = "請先選擇場次";
                toggleBtn.className = "order-open-btn";
                return;
            }
        
            const res = await fetch(`/api/${currentConcert}/seats`);
            const data = await res.json();
        
            renderOrderOpenButton(data.order_open);
        }
        
        function renderOrderOpenButton(isOpen) {
        
            const label = concertLabels[currentConcert] || "目前場次";

            toggleBtn.textContent = isOpen
                ? `${label}購票開放中｜點擊關閉`
                : `${label}購票已關閉｜點擊開放`;
        
            toggleBtn.className = isOpen
                ? "order-open-btn is-open"
                : "order-open-btn is-closed";
        }
        
        toggleBtn.addEventListener("click", async () => {
        
            const ok = confirm("確定要切換購票開放狀態嗎？");
        
            if (!ok) return;
        
            if (!requireConcertSelected()) return;

            const res = await fetch(`/api/admin/toggle-order-open?mode=${encodeURIComponent(currentConcert)}`, {
                method: "POST"
            });
        
            const data = await res.json();
        
            if (!data.success) {
                alert(data.message || "切換失敗");
                return;
            }
        
            renderOrderOpenButton(data.order_open);
        });
        
    </script>
    
</body>
</html>
