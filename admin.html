<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《嶋聲》後台管理</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body class="admin-page">
    <div class="admin-shell">
        <div class="admin-topbar">
            <div class="admin-title-wrap">
                <h1>後台管理</h1>
                <p>可搜尋訂單、切換鎖定狀態、付款狀態、取票狀態與刪除訂單</p>
            </div>
        
            <div style="display:flex; flex-direction:column; gap:10px;">
        
                <button
                    id="order-open-toggle-btn"
                    type="button"
                    class="order-open-btn"
                >
                    讀取購票狀態中...
                </button>
        
                <a href="/" class="back-link-btn">
                    回到選位頁
                </a>
        
                <a href="/edit" class="back-link-btn">
                    修改資料
                </a>
        
            </div>
        </div>
        </div>

        <div class="admin-search-card">
            <input
                id="admin-keyword-input"
                class="admin-search-input"
                type="text"
                placeholder="輸入姓名或訂單ID"
            />
            <button id="admin-search-btn" class="admin-search-btn" type="button">查詢</button>
        </div>

        <div class="admin-table-card">
            <div class="admin-table-scroll">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>訂單日期與時間</th>
                            <th>訂單ID</th>
                            <th>姓名</th>
                            <th>排數</th>
                            <th>座位</th>
                            <th>票價</th>
                            <th>備註</th>
                            <th>鎖定狀態</th>
                            <th>付款狀態</th>
                            <th>取票狀態</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-tbody">
                        <tr>
                            <td colspan="10" class="empty-state">請先輸入姓名或訂單ID查詢</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let authed = false;
        
        function showUnauthorized() {
            document.body.innerHTML = `
                <div style="
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: Arial, 'Noto Sans TC', sans-serif;
                    background: linear-gradient(135deg, #0f3b3a, #4b1f11);
                    color: white;
                    font-size: 28px;
                    font-weight: 800;
                ">
                    你不是票務 :(
                </div>
            `;
        }
        
        async function requirePassword() {
            if (sessionStorage.getItem("admin_ok") === "1") {
                authed = true;
                return true;
            }
        
            const input = prompt("請輸入密碼");
            if (!input) {
                showUnauthorized();
                return false;
            }
        
            const res = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: input })
            });
        
            const raw = await res.text();
            console.log("login status:", res.status);
            console.log("login raw:", raw);
        
            let data;
            try {
                data = JSON.parse(raw);
            } catch {
                alert(`登入 API 回傳不是 JSON：${res.status}`);
                showUnauthorized();
                return false;
            }
        
            if (res.ok && data.success) {
                sessionStorage.setItem("admin_ok", "1");
                authed = true;
                return true;
            }
        
            alert(data.message || "你不是票務 :(");
            showUnauthorized();
            return false;
        }

        let currentKeyword = "";

        function escapeHtml(text) {
            return String(text ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function lockButtonHtml(order) {
            if (order.order_status === "locked") {
                return `<button class="pill-btn dark" type="button" onclick="toggleLock('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">鎖定</button>`;
            }
            return `<button class="pill-btn cyan" type="button" onclick="toggleLock('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">開放刪除</button>`;
        }

        function paymentButtonHtml(order) {
            if (order.payment_done) {
                return `<button class="pill-btn green" type="button" onclick="togglePayment('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已付款</button>`;
            }
            return `<button class="pill-btn gray" type="button" onclick="togglePayment('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">未付款</button>`;
        }

        function pickupButtonHtml(order) {
            if (order.picked_up) {
                return `<button class="pill-btn blue" type="button" onclick="advancePickup('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已取</button>`;
            }
        
            if (order.pickup_open) {
                return `<button class="pill-btn green" type="button" onclick="advancePickup('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已開放</button>`;
            }
        
            if (order.ticket_adjusted) {
                return `<button class="pill-btn cyan" type="button" onclick="advancePickup('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">已調票</button>`;
            }
        
            return `<button class="pill-btn gray" type="button" onclick="toggleTicketAdjusted('${escapeHtml(order.order_id)}', '${escapeHtml(order.floor)}', '${escapeHtml(order.row_label)}')">未開放</button>`;
        }

        function renderAdminOrders(orders) {
            const tbody = document.getElementById("admin-orders-tbody");
            if (!tbody) return;

            if (!orders.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="empty-state">查無資料</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td class="info-text">${escapeHtml(order.datetime)}</td>
                    <td class="info-text">${escapeHtml(order.order_id)}</td>
                    <td class="info-text">${escapeHtml(order.name)}</td>
                    <td class="info-text">${escapeHtml(order.floor)}${escapeHtml(order.row_label)}排</td>
                    <td class="info-text seats-cell">${order.seats.map(seat => `${seat}`).join("、")}</td>
                    <td class="info-text">$${order.price}</td>
                    <td>
                        <input
                            id="admin-note-${escapeHtml(order.order_id)}"
                            class="note-input"
                            type="text"
                            value="${escapeHtml(order.note || "")}"
                            placeholder="備註"
                        />
                    </td>
                    <td><div class="cell-center">${lockButtonHtml(order)}</div></td>
                    <td><div class="cell-center">${paymentButtonHtml(order)}</div></td>
                    <td><div class="cell-center">${pickupButtonHtml(order)}</div></td>
                </tr>
            `).join("");
        }

        async function searchAdminOrders() {
            if (!authed) return;
        
            const input = document.getElementById("admin-keyword-input");
            const keyword = input.value.trim();
        
            currentKeyword = keyword;
        
            const url = keyword
                ? `/api/admin/orders?keyword=${encodeURIComponent(keyword)}`
                : `/api/admin/orders`;
        
            const res = await fetch(url);
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "查詢失敗");
                return;
            }
        
            renderAdminOrders(data.orders || []);
        }

        async function toggleLock(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/lock` +
                `?floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function togglePayment(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/payment` +
                `?floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function advancePickup(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/pickup/advance` +
                `?floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function toggleTicketAdjusted(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}/ticket-adjusted` +
                `?floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "PATCH"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "更新失敗");
                return;
            }
        
            searchAdminOrders();
        }
        
        async function deleteOrder(orderId, floor, rowLabel) {
            if (!authed) return;
        
            const ok = confirm("確定要刪除這排座位嗎？");
            if (!ok) return;
        
            const url =
                `/api/admin/orders/${encodeURIComponent(orderId)}` +
                `?floor=${encodeURIComponent(floor)}` +
                `&row_label=${encodeURIComponent(rowLabel)}`;
        
            const res = await fetch(url, {
                method: "DELETE"
            });
        
            const data = await res.json();
        
            if (!res.ok || !data.success) {
                alert(data.message || "刪除失敗");
                return;
            }
        
            searchAdminOrders();
        }

        document.getElementById("admin-search-btn").addEventListener("click", searchAdminOrders);
        document.getElementById("admin-keyword-input").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                searchAdminOrders();
            }
        });
    
        window.onload = async () => {
            const ok = await requirePassword();
            if (ok) {
                searchAdminOrders();
            }
        };

        const toggleBtn = document.getElementById("order-open-toggle-btn");
        
        async function loadOrderOpenStatus() {
        
            const res = await fetch("/api/system_status");
            const data = await res.json();
        
            renderOrderOpenButton(data.order_open);
        }
        
        function renderOrderOpenButton(isOpen) {
        
            toggleBtn.textContent = isOpen
                ? "目前購票開放中｜點擊關閉"
                : "目前購票已關閉｜點擊開放";
        
            toggleBtn.className = isOpen
                ? "order-open-btn is-open"
                : "order-open-btn is-closed";
        }
        
        toggleBtn.addEventListener("click", async () => {
        
            const ok = confirm("確定要切換購票開放狀態嗎？");
        
            if (!ok) return;
        
            const res = await fetch("/api/admin/toggle_order_open", {
                method: "POST"
            });
        
            const data = await res.json();
        
            if (!data.success) {
                alert(data.message || "切換失敗");
                return;
            }
        
            renderOrderOpenButton(data.order_open);
        });
        
        loadOrderOpenStatus();
        
    </script>
    
</body>
</html>
