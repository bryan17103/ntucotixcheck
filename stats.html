<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《嶋聲》團內購票推票統計</title>
    <link rel="icon" type="image/png" href="/NTUCO.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/stats.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="stats-page">
    <div class="stats-shell">
        <div class="stats-topbar">
            <div class="stats-title-wrap">
                <h1>《嶋聲》團內購票推票統計</h1>
                <p>衝啊啊啊啊啊啊啊啊🔥</p>
            </div>

            <a href="/" class="back-link-btn">回到首頁</a>
        </div>

        <div class="hero-grid" id="overview-grid"></div>

        <div class="stats-content-grid">
            <div class="stats-left-column">
                <div class="panel-card ranking-panel-card">
                    <div class="card-title">個人推票排行榜</div>
                    <div class="ranking-table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>姓名</th>
                                    <th>聲部</th>
                                    <th>總累積推票數</th>
                                </tr>
                            </thead>
                            <tbody id="ranking-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel-card section-summary-panel-card">
                    <div class="card-title">各聲部推票張數統計</div>
                    <div id="section-grid" class="section-summary-list"></div>
                </div>
            </div>

            <div class="stats-right-column">
                <div class="panel-card chart-panel-card">
                    <div class="card-title">各組推票分佈</div>
                    <div class="chart-wrap">
                        <canvas id="section-pie-chart"></canvas>
                    </div>
                </div>

                <div class="panel-card reward-panel-card">
                    <div class="card-title">推票獎勵統計 (總累積推票積分)</div>
                    <div class="reward-table-scroll">
                        <table class="reward-table">
                            <thead>
                                <tr>
                                    <th>獎勵</th>
                                    <th>條件</th>
                                    <th>人數</th>
                                    <th>你好厲害</th>
                                </tr>
                            </thead>
                            <tbody id="reward-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        © 2026 NTUCO All Rights Reserved.
    </footer>

    <div id="stats-loading-overlay" class="stats-loading-overlay hidden">
        <div class="stats-loading-card">
            <div class="stats-loading-spinner"></div>
            <div id="stats-loading-text">載入中......</div>
        </div>
    </div>

    <script>
        let sectionPieChart = null;

        function formatMoney(v) {
            return `$${Number(v || 0).toLocaleString()}`;
        }

        function showStatsLoading(text = "載入中...") {
            const overlay = document.getElementById("stats-loading-overlay");
            const textEl = document.getElementById("stats-loading-text");

            if (textEl) textEl.textContent = text;
            overlay?.classList.remove("hidden");
        }

        function hideStatsLoading() {
            const overlay = document.getElementById("stats-loading-overlay");
            overlay?.classList.add("hidden");
        }    

        function buildSeatZoneTotals(seats, mode = "tp") {
            const totals = mode === "kh"
                ? { "800": 0, "500": 0, "300": 0, "200": 0 }
                : { "500": 0, "300": 0, "200": 0 };

            for (const seat of seats || []) {
                const zone = String(seat.zone || "");
                const price = Number(seat.price || 0);

                // 只排除明確不可購買／非座位資料
                if (seat.is_seat === false) continue;
                if (seat.available === false && !seat.sold) continue;

                if (
                    mode === "kh" &&
                    (
                        zone.includes("800") ||
                        price === 800 ||
                        price === 640
                    )
                ) {
                    totals["800"] += 1;
                } else if (
                    zone.includes("500") ||
                    price === 500 ||
                    price === 400
                ) {
                    totals["500"] += 1;
                } else if (
                    zone.includes("300") ||
                    price === 300 ||
                    price === 240
                ) {
                    totals["300"] += 1;
                } else if (
                    zone.includes("200") ||
                    price === 200 ||
                    price === 160
                ) {
                    totals["200"] += 1;
                }
            }

            return totals;
        }

        async function loadStats() {
            try {
                showStatsLoading("正在載入推票統計...");

                const [
                    tpStatsRes,
                    tpSeatsRes,
                    khStatsRes,
                    khSeatsRes,
                    allStatsRes
                ] = await Promise.all([
                    fetch("/api/stats?mode=tp"),
                    fetch("/api/tp/seats"),
                    fetch("/api/stats?mode=kh"),
                    fetch("/api/kh/seats?show_third=false"),
                    fetch("/api/stats?mode=all")
                ]);

                const tpResult = await tpStatsRes.json();
                const tpSeatsResult = await tpSeatsRes.json();

                const khResult = await khStatsRes.json();
                const khSeatsResult = await khSeatsRes.json();

                const allResult = await allStatsRes.json();

                if (!tpResult.success || !khResult.success || !allResult.success) {
                    alert("統計讀取失敗");
                    return;
                }

                const tpData = tpResult.data || {};
                const khData = khResult.data || {};
                const allData = allResult.data || {};

                const tpSeatZoneTotals = buildSeatZoneTotals(tpSeatsResult.seats || [], "tp");
                const khSeatZoneTotals = buildSeatZoneTotals(khSeatsResult.seats || [], "kh");

                renderOverview(
                    tpData.overview || {},
                    tpSeatZoneTotals,
                    khData.overview || {},
                    khSeatZoneTotals
                );

                renderRanking(allData.ranking || []);
                renderSections(allData.sections || []);
                renderRewards(allData.rewards || []);
                renderSectionChart(allData.section_chart || []);

            } catch (error) {
                console.error(error);
                alert("統計資料載入失敗，請稍後再試");

            } finally {
                hideStatsLoading();
            }
        }

        function renderHeroCard(label, current, target, type = "progress") {
            return `
                <div class="hero-card hero-card-${type}">
                    <div class="hero-label">${label}</div>
                    <div class="hero-progress-main">
                        ${current}
                        <span class="hero-progress-target">/ ${target}</span>
                    </div>
                </div>
            `;
        }

        function renderMoneyCard(label, amount) {
            return `
                <div class="hero-card hero-card-money">
                    <div class="hero-label">${label}</div>
                    <div class="hero-money-main">${formatMoney(amount)}</div>
                </div>
            `;
        }

        function renderZoneCard(label, current, total, zone, mode = "") {
            return `
                <div class="hero-card hero-card-zone zone-${zone}-card ${mode ? `zone-${zone}-${mode}` : ""}">
                    <div class="hero-label">${label}</div>
                    <div class="hero-zone-main zone-${zone}-text">
                        ${current}
                        <span class="hero-progress-target">/ ${total}</span>
                    </div>
                </div>
            `;
        }

        function renderMessageCard(title, message) {
            return `
                <div class="hero-card hero-card-message">
                    <div class="hero-label">${title}</div>

                    <div class="hero-message-main">
                        ${message}
                    </div>
                </div>
            `;
        }

        function renderOverview(tpOverview, tpSeatZoneTotals, khOverview, khSeatZoneTotals) {
            const tpZoneTickets = tpOverview.zone_tickets || {};
            const khZoneTickets = khOverview.zone_tickets || {};

            document.getElementById("overview-grid").innerHTML = `
                <div class="overview-row">
                    <div class="overview-row-title">台北場</div>

                    ${renderHeroCard("推票進度", tpOverview.total_tickets || 0, tpOverview.target_tickets || 0, "progress")}
                    ${renderMoneyCard("累積總金額", tpOverview.total_amount)}
                    ${renderZoneCard("500 元區", tpZoneTickets["500"] || 0, tpSeatZoneTotals["500"] || 0, "500", "tp")}
                    ${renderZoneCard("300 元區", tpZoneTickets["300"] || 0, tpSeatZoneTotals["300"] || 0, "300", "tp")}
                    ${renderZoneCard("200 元區", tpZoneTickets["200"] || 0, tpSeatZoneTotals["200"] || 0, "200", "tp")}
                    ${renderMessageCard("我只是來湊位子的", "大家加油！")}
                </div>

                <div class="overview-row">
                    <div class="overview-row-title">高雄場</div>

                    ${renderHeroCard("推票進度", khOverview.total_tickets || 0, khOverview.target_tickets || 0, "progress")}
                    ${renderMoneyCard("累積總金額", khOverview.total_amount)}
                    ${renderZoneCard("800 元區", khZoneTickets["800"] || 0, khSeatZoneTotals["800"] || 0, "800", "kh")}
                    ${renderZoneCard("500 元區", khZoneTickets["500"] || 0, khSeatZoneTotals["500"] || 0, "500", "kh")}
                    ${renderZoneCard("300 元區", khZoneTickets["300"] || 0, khSeatZoneTotals["300"] || 0, "300", "kh")}
                    ${renderZoneCard("200 元區", khZoneTickets["200"] || 0, khSeatZoneTotals["200"] || 0, "200", "kh")}
                </div>
            `;
        }

        function renderSectionChart(sectionChart) {
            const canvas = document.getElementById("section-pie-chart");
            if (!canvas) return;

            const filtered = sectionChart.filter(item => Number(item.tickets || 0) > 0);
            const labels = filtered.map(item => item.section);
            const values = filtered.map(item => item.tickets);

            const colorMap = {
                "吹管": "#4E79A7",     // 深霧藍
                "彈撥": "#D28C45",     // 焦糖橘
                "拉弦": "#6E9F5B",     // 鼠尾草綠
                "低音": "#7B6FA6",     // 灰紫
                "打擊": "#C65D57",     // 磚紅
                "指揮": "#8A766B",     // 摩卡棕
                "特殊來源": "#5E8B95", // 灰藍青
            };

            const colors = labels.map(label => colorMap[label] || "#B7B7B7");

            if (sectionPieChart) {
                sectionPieChart.destroy();
            }

            sectionPieChart = new Chart(canvas, {
                type: "pie",
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: "#ffffff",
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: "bottom",
                            labels: {
                                boxWidth: 15,
                                padding: 20,
                                font: {
                                    size: 14,
                                    weight: "700"
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const value = context.raw;
                                    const percent = total ? ((value / total) * 100).toFixed(1) : 0;
                                    return `${context.label}：${value} 張（${percent}%）`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderRanking(ranking) {
            if (!ranking.length) {
                document.getElementById("ranking-body").innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-text">目前尚無資料</td>
                    </tr>
                `;
                return;
            }

            document.getElementById("ranking-body").innerHTML = ranking.map((item, i) => `
                <tr class="${i < 3 ? 'ranking-row-top' : ''}">
                    <td><span class="rank-badge">${i + 1}</span></td>
                    <td class="ranking-name">${item.name}</td>
                    <td class="ranking-section">${item.section}</td>
                    <td class="ranking-ticket">${item.tickets}</td>
                </tr>
            `).join("");
        }

        function renderSections(sections) {
            document.getElementById("section-grid").innerHTML = sections.map(section => `
                <div class="section-block">
                    <div class="section-name-cell">${section.section}</div>
                    <div class="section-total-cell">${section.subtotal}</div>
        
                    <div class="section-members-cell">
                        ${
                            section.members.length
                                ? section.members.map(m => `
                                    <span class="section-member-chip">
                                        <span class="section-member-name">${m.name}</span>
                                        <strong class="section-member-count">${m.tickets}</strong>
                                    </span>
                                `).join(`<span class="section-separator">/</span>`)
                                : `<span class="empty-text">繼續加油努力推票！！</span>`
                        }
                    </div>
                </div>
            `).join("");
        }

        function renderConditionChips(requirementText) {
            if (!requirementText) return `<span class="reward-empty">—</span>`;

            const parts = requirementText.split(" + ").map(part => part.trim()).filter(Boolean);

            return `
                <div class="reward-condition-wrap">
                    ${parts.map(part => `<span class="reward-condition-chip">${part}</span>`).join("")}
                </div>
            `;
        }

        function renderRewardNames(names) {
            if (!names || !names.length) return "—";
        
            return names.map(item => {
                if (typeof item === "string") return item;
                return item.name;
            }).join("、");
        }
        
        function renderRewards(rewards) {
            if (!rewards.length) {
                document.getElementById("reward-body").innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-text">尚未設定獎勵規則</td>
                    </tr>
                `;
                return;
            }

            document.getElementById("reward-body").innerHTML = rewards.map(r => `
                <tr>
                    <td class="reward-main"> ${String(r.reward || "") .replaceAll(" ", "&nbsp;") .replaceAll("　", "&emsp;")} </td>
                    <td>${renderConditionChips(r.requirement)}</td>
                    <td class="reward-count">${r.count}</td>
                    <td class="reward-names">${renderRewardNames(r.names)}</td>
                </tr>
            `).join("");
        }

        loadStats();
    </script>
</body>
</html>
