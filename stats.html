<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《嶋聲》台北場推票統計</title>
    <link rel="stylesheet" href="/stats.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="stats-shell">
        <div class="stats-topbar">
            <div class="stats-title-wrap">
                <h1>《嶋聲》台北場推票統計</h1>
                <p>衝啊啊啊啊啊啊啊啊🔥</p>
            </div>

            <a href="/" class="back-link-btn">回到選位頁</a>
        </div>

        <div class="hero-grid" id="overview-grid"></div>

        <div class="stats-content-grid">
            <div class="stats-left-column">
                <div class="panel-card ranking-panel-card">
                    <div class="card-title">個人推票排行榜</div>
                    <div class="ranking-table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>姓名</th>
                                    <th>聲部</th>
                                    <th>推票數</th>
                                </tr>
                            </thead>
                            <tbody id="ranking-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel-card section-summary-panel-card">
                    <div class="card-title">各聲部推票統計</div>
                    <div id="section-grid" class="section-summary-list"></div>
                </div>
            </div>

            <div class="stats-right-column">
                <div class="panel-card chart-panel-card">
                    <div class="card-title">各組推票分佈</div>
                    <div class="chart-wrap">
                        <canvas id="section-pie-chart"></canvas>
                    </div>
                </div>

                <div class="panel-card reward-panel-card">
                    <div class="card-title">推票獎勵統計</div>
                    <div class="reward-table-scroll">
                        <table class="reward-table">
                            <thead>
                                <tr>
                                    <th>獎勵</th>
                                    <th>條件</th>
                                    <th>人數</th>
                                    <th>你好厲害</th>
                                </tr>
                            </thead>
                            <tbody id="reward-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sectionPieChart = null;

        function formatMoney(v) {
            return `$${Number(v || 0).toLocaleString()}`;
        }

        function buildSeatZoneTotals(seats) {
            const totals = { "500": 0, "300": 0, "200": 0 };

            for (const seat of seats || []) {
                const zone = String(seat.zone || "");
                const price = Number(seat.price || 0);
                const available = Boolean(seat.available);

                if (!available) continue;

                if (zone === "group-500" || price === 400) {
                    totals["500"] += 1;
                } else if (zone === "group-300" || price === 240) {
                    totals["300"] += 1;
                } else if (zone === "group-200" || price === 160) {
                    totals["200"] += 1;
                }
            }

            return totals;
        }

        async function loadStats() {
            const [statsRes, seatsRes] = await Promise.all([
                fetch("/api/stats"),
                fetch("/api/seats")
            ]);

            const result = await statsRes.json();
            const seatsResult = await seatsRes.json();

            if (!result.success) {
                alert(result.message || "統計讀取失敗");
                return;
            }

            const data = result.data;
            const seatZoneTotals = buildSeatZoneTotals(seatsResult.seats || []);

            renderOverview(data.overview || {}, seatZoneTotals);
            renderRanking(data.ranking || []);
            renderSections(data.sections || []);
            renderRewards(data.rewards || []);
            renderSectionChart(data.section_chart || []);
        }

        function renderOverview(overview, seatZoneTotals) {
            const zoneTickets = overview.zone_tickets || {};

            document.getElementById("overview-grid").innerHTML = `
                <div class="hero-card hero-card-progress">
                    <div class="hero-label">推票進度</div>
                    <div class="hero-progress-main">
                        ${overview.total_tickets || 0}
                        <span class="hero-progress-target">/ ${overview.target_tickets || 0}</span>
                    </div>
                </div>

                <div class="hero-card hero-card-money">
                    <div class="hero-label">累積總金額</div>
                    <div class="hero-money-main">${formatMoney(overview.total_amount)}</div>
                </div>

                <div class="hero-card hero-card-zone zone-500-card">
                    <div class="hero-label">500 元區</div>
                    <div class="hero-zone-main zone-500-text">
                        ${zoneTickets["500"] || 0}
                        <span class="hero-progress-target">/ ${seatZoneTotals["500"] || 0}</span>
                    </div>
                </div>

                <div class="hero-card hero-card-zone zone-300-card">
                    <div class="hero-label">300 元區</div>
                    <div class="hero-zone-main zone-300-text">
                        ${zoneTickets["300"] || 0}
                        <span class="hero-progress-target">/ ${seatZoneTotals["300"] || 0}</span>
                    </div>
                </div>

                <div class="hero-card hero-card-zone zone-200-card">
                    <div class="hero-label">200 元區</div>
                    <div class="hero-zone-main zone-200-text">
                        ${zoneTickets["200"] || 0}
                        <span class="hero-progress-target">/ ${seatZoneTotals["200"] || 0}</span>
                    </div>
                </div>
            `;
        }

        function renderSectionChart(sectionChart) {
            const canvas = document.getElementById("section-pie-chart");
            if (!canvas) return;

            const filtered = sectionChart.filter(item => Number(item.tickets || 0) > 0);
            const labels = filtered.map(item => item.section);
            const values = filtered.map(item => item.tickets);

            const colorMap = {
                "吹管": "#4E79A7",     // 深霧藍
                "彈撥": "#D28C45",     // 焦糖橘
                "拉弦": "#6E9F5B",     // 鼠尾草綠
                "低音": "#7B6FA6",     // 灰紫
                "打擊": "#C65D57",     // 磚紅
                "指揮": "#8A766B",     // 摩卡棕
                "特殊來源": "#5E8B95", // 灰藍青
            };

            const colors = labels.map(label => colorMap[label] || "#B7B7B7");

            if (sectionPieChart) {
                sectionPieChart.destroy();
            }

            sectionPieChart = new Chart(canvas, {
                type: "pie",
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: "#ffffff",
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: "bottom",
                            labels: {
                                boxWidth: 14,
                                padding: 16,
                                font: {
                                    size: 14,
                                    weight: "700"
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const value = context.raw;
                                    const percent = total ? ((value / total) * 100).toFixed(1) : 0;
                                    return `${context.label}：${value} 張（${percent}%）`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderRanking(ranking) {
            if (!ranking.length) {
                document.getElementById("ranking-body").innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-text">目前尚無資料</td>
                    </tr>
                `;
                return;
            }

            document.getElementById("ranking-body").innerHTML = ranking.map((item, i) => `
                <tr class="${i < 3 ? 'ranking-row-top' : ''}">
                    <td><span class="rank-badge">${i + 1}</span></td>
                    <td class="ranking-name">${item.name}</td>
                    <td class="ranking-section">${item.section}</td>
                    <td class="ranking-ticket">${item.tickets}</td>
                </tr>
            `).join("");
        }

        function renderSections(sections) {
            document.getElementById("section-grid").innerHTML = sections.map(section => `
                <div class="section-block">
                    <div class="section-name-cell">${section.section}</div>
                    <div class="section-total-cell">${section.subtotal}</div>
        
                    <div class="section-members-cell">
                        ${
                            section.members.length
                                ? section.members.map(m => `
                                    <span class="section-member-chip">
                                        <span class="section-member-name">${m.name}</span>
                                        <strong class="section-member-count">${m.tickets}</strong>
                                    </span>
                                `).join(`<span class="section-separator">/</span>`)
                                : `<span class="empty-text">繼續加油努力推票！！</span>`
                        }
                    </div>
                </div>
            `).join("");
        }

        function renderConditionChips(requirementText) {
            if (!requirementText) return `<span class="reward-empty">—</span>`;

            const parts = requirementText.split(" + ").map(part => part.trim()).filter(Boolean);

            return `
                <div class="reward-condition-wrap">
                    ${parts.map(part => `<span class="reward-condition-chip">${part}</span>`).join("")}
                </div>
            `;
        }

        function renderRewardNames(names) {
            if (!names || !names.length) return "—";
        
            return names.map(item => {
                if (typeof item === "string") return item;
                return item.name;
            }).join("、");
        }
        
        function renderRewards(rewards) {
            if (!rewards.length) {
                document.getElementById("reward-body").innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-text">尚未設定獎勵規則</td>
                    </tr>
                `;
                return;
            }

            document.getElementById("reward-body").innerHTML = rewards.map(r => `
                <tr>
                    <td class="reward-main">${r.reward}</td>
                    <td>${renderConditionChips(r.requirement)}</td>
                    <td class="reward-count">${r.count}</td>
                    <td class="reward-names">${renderRewardNames(r.names)}</td>
                </tr>
            `).join("");
        }

        loadStats();
    </script>
</body>
</html>
