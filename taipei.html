<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《嶋聲》台北場購票</title>
    <link rel="icon" type="image/png" href="/NTUCO.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/taipei.css">
</head>

<body>
    <header class="hero">
        <div class="poster-info">
    
            <p class="concert-label">
                《嶋聲》台北場購票
            </p>
    
            <p class="ticket-deadline">
                台北場團內購票截止：2026/07/10 23:59
                <span id="deadline-countdown">（倒數計算中）</span>
            </p>
    
        </div>
    
        <div class="birds">⌁ ⌁ ⌁</div>
    </header>

    <div class="app-shell">
        <main class="seat-card">
            <div class="map-floating-tools">
                <button type="button" id="zoom-in-btn" class="tool-btn" title="放大">
                    <svg viewBox="0 0 24 24" class="tool-icon" aria-hidden="true">
                        <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                        <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line>
                        <line x1="10" y1="7.3" x2="10" y2="12.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line>
                        <line x1="7.3" y1="10" x2="12.7" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line>
                    </svg>
                </button>

                <button type="button" id="zoom-out-btn" class="tool-btn" title="縮小">
                    <svg viewBox="0 0 24 24" class="tool-icon" aria-hidden="true">
                        <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                        <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line>
                        <line x1="7.3" y1="10" x2="12.7" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></line>
                    </svg>
                </button>
            </div>

            <div id="map-viewport">
                <div id="seat-map-scale">
                    <div class="stage-box map-stage">舞台</div>
                    <div id="seat-map"></div>
                </div>
                <div id="seat-tooltip" class="seat-tooltip hidden"></div>
            </div>
        </main>
        
        <aside class="sidebar">
        
            <div class="sidebar-scroll-area">
                <h2>已選座位</h2>
                <div id="selected-list">尚未選擇</div>
        
                <h3 class="sidebar-subtitle">票區統計</h3>
                <div id="zone-summary">尚未選擇</div>
            </div>
        
            <div class="sidebar-bottom">
                <div id="summary">已選 0 位，總金額：$0</div>
        
                <div class="sidebar-actions">
                    <button id="confirm-btn" type="button">確認選位</button>
                    <a href="/" class="secondary-link-btn home-link-btn">回到首頁</a>
                </div>
            </div>
        
        </aside>
    </div>

    <div id="name-modal" class="modal-overlay hidden">
        <div class="modal-card name-modal-card">
    
            <h2>確認購票</h2>
    
            <input
                id="buyer-name-input"
                class="name-modal-input"
                type="text"
                placeholder="請輸入中文全名"
                maxlength="10"
            />
    
            <div class="name-modal-actions">
                <button type="button" class="name-cancel-btn" id="name-cancel-btn">
                    取消
                </button>
    
                <button type="button" class="name-confirm-btn" id="name-confirm-btn">
                    確認購票
                </button>
            </div>
    
        </div>
        
    </div>
    <div id="success-modal" class="modal-overlay hidden">
        <div class="modal-card success-modal-card">
            <button class="modal-close-btn" type="button" id="success-close-btn">×</button>

            <div class="success-icon">✓</div>

            <h2 id="success-title">購票成功！</h2>

            <p id="success-message">
                訂單已成立！
            </p>

            <button class="success-confirm-btn" type="button" id="success-confirm-btn">
                薰風感謝您的貢獻 🫶
            </button>
        </div>
    </div>

    <script src="/app_tp.js"></script>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-card">
            <div class="loading-spinner"></div>
            <p>座位圖載入中...</p>
        </div>
    </div>

    <script>
        const deadline = new Date("2026-07-10T23:59:00+08:00");
        const countdownEl = document.getElementById("deadline-countdown");
    
        function updateCountdown() {
            const now = new Date();
            const diff = deadline - now;
    
            if (diff <= 0) {
                countdownEl.textContent = "（已截止）";
                return;
            }
    
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
    
            countdownEl.textContent =
                `（倒數 ${days} 天 ${hours} 小時 ${minutes} 分 ${seconds} 秒）`;
        }
    
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
        
        <footer class="page-footer">
            © 2026 NTUCO All Rights Reserved.
        </footer>
        
    </body>
</html>
