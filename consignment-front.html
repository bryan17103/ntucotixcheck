<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《嶋聲》前台寄票管理</title>
    <link rel="icon" type="image/png" href="/NTUCO.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet"
    >

    <!-- 共用寄票樣式 + 前台專用樣式 -->
    <link rel="stylesheet" href="/consignment.css">
    <link rel="stylesheet" href="/consignment-front.css">
</head>

<body class="consignment-page consignment-front-page">

    <main class="consignment-shell">

        <header class="consignment-hero">
            <div class="consignment-title-wrap">
                <h1>《嶋聲》前台寄票管理</h1>
                <p class="consignment-note main">
                    前台取票與票務交票專用頁面
                </p>
            </div>

            <a href="/" class="back-link-btn">回到首頁</a>
        </header>

        <!-- 登入區 -->
        <section id="front-login-panel" class="front-login-panel">
            <div class="front-login-card">
                <div class="summary-card-header">
                    <div class="summary-icon">🔐</div>
                    <div>
                        <div class="summary-label">前台專用登入</div>
                        <p class="front-login-note">
                            請輸入前台密碼後繼續操作。
                        </p>
                    </div>
                </div>

                <form id="front-login-form" class="front-login-form">
                    <label class="consignment-field">
                        <span>前台密碼</span>
                        <input id="front-password" type="password" placeholder="請輸入前台密碼">
                    </label>

                    <button class="consignment-submit-btn" type="submit">
                        登入
                    </button>
                </form>

                <div id="front-login-message" class="form-message hidden"></div>
            </div>
        </section>

        <!-- 主操作區 -->
        <section id="front-app-panel" class="hidden">

            <div class="consignment-mode-tabs front-mode-tabs">
                <button class="consignment-mode-tab active" type="button" data-front-mode="frontdesk">
                    前台專用
                </button>
                <button class="consignment-mode-tab" type="button" data-front-mode="ticket">
                    票務專用
                </button>
            </div>

            <!-- 前台專用 -->
            <section id="frontdesk-panel" class="front-mode-panel active">
                <section class="front-action-bar frontdesk-action-bar">
                    <div class="front-action-title">
                        <div class="summary-icon">🎫</div>
                        <div>
                            <div class="summary-label">前台取票查詢</div>
                        </div>
                    </div>

                    <label class="consignment-field">
                        <span>場次</span>
                        <select id="frontdesk-concert-code">
                            <option value="tp">台北場</option>
                            <option value="kh">高雄場</option>
                        </select>
                    </label>

                    <button id="frontdesk-load-btn" class="consignment-search-btn front-load-btn" type="button">
                        載入與刷新資料
                    </button>

                    <button id="frontdesk-list-all-btn" class="front-filter-btn active" type="button">
                        列出所有
                    </button>

                    <button id="frontdesk-list-unpicked-btn" class="front-filter-btn" type="button">
                        列出未取
                    </button>

                    <button id="frontdesk-list-picked-btn" class="front-filter-btn" type="button">
                        列出已取
                    </button>

                    <label class="consignment-field front-keyword-field">
                        <span>查詢內容</span>
                        <input id="frontdesk-keyword" type="text" placeholder="TP0001、0001、1、取票人或寄票人">
                    </label>

                    <button id="frontdesk-search-btn" class="consignment-search-btn" type="button">
                        查詢
                    </button>
                </section>

                <section id="frontdesk-result-card" class="consignment-result-card query-result-card hidden">
                    <div class="result-header">
                        <div>
                            <h2 id="frontdesk-result-title">查詢結果</h2>
                            <p id="frontdesk-result-note">請確認資料後再完成取票。</p>
                        </div>
                    </div>

                    <div id="frontdesk-summary-grid" class="query-summary-grid frontdesk-summary-grid hidden">
                        <div class="query-summary-item">
                            <span>查詢筆數</span>
                            <strong id="frontdesk-record-count">0 筆</strong>
                        </div>

                        <div class="query-summary-item">
                            <span>總張數</span>
                            <strong id="frontdesk-ticket-count">0 張</strong>
                        </div>

                        <div class="query-summary-item highlight">
                            <span>前台應收</span>
                            <strong id="frontdesk-total-amount">$0</strong>
                        </div>

                        <div class="query-summary-item blue">
                            <span>前台已收</span>
                            <strong id="frontdesk-collected-amount">$0</strong>
                        </div>

                        <div class="query-summary-item warning">
                            <span>未取信封</span>
                            <strong id="frontdesk-pending-count">0 筆</strong>
                        </div>

                        <div class="query-summary-item blue">
                            <span>已取信封</span>
                            <strong id="frontdesk-picked-count">0 筆</strong>
                        </div>
                    </div>

                    <div id="frontdesk-result-list" class="consignment-record-list"></div>
                </section>
            </section>

            <!-- 票務專用 -->
            <section id="ticket-panel" class="front-mode-panel">
                <section class="front-action-bar ticket-action-bar">
                    <div class="front-action-title">
                        <div class="summary-icon">📦</div>
                        <div>
                            <div class="summary-label">票務寄放管理</div>
                            <p class="query-card-note">
                                可載入全部寄票資料，或用寄票人姓名篩選。
                            </p>
                        </div>
                    </div>

                    <label class="consignment-field">
                        <span>場次</span>
                        <select id="ticket-concert-code">
                            <option value="tp">台北場</option>
                            <option value="kh">高雄場</option>
                        </select>
                    </label>

                    <label class="consignment-field front-keyword-field">
                        <span>寄票人姓名</span>
                        <input id="ticket-owner-keyword" type="text" placeholder="可留空，留空會載入全部">
                    </label>

                    <button id="ticket-load-btn" class="consignment-search-btn" type="button">
                        載入資料
                    </button>
                </section>

                <section id="ticket-result-card" class="consignment-result-card query-result-card hidden">
                    <div class="result-header">
                        <div>
                            <h2 id="ticket-result-title">票務資料</h2>
                            <p id="ticket-result-note">請確認已收到實體票後，再更新為已寄放前台。</p>
                        </div>
                    </div>

                    <div id="ticket-summary-grid" class="query-summary-grid hidden">
                        <div class="query-summary-item">
                            <span>寄放筆數</span>
                            <strong id="ticket-record-count">0 筆</strong>
                        </div>

                        <div class="query-summary-item">
                            <span>總張數</span>
                            <strong id="ticket-ticket-count">0 張</strong>
                        </div>

                        <div class="query-summary-item highlight">
                            <span>前台應收金額</span>
                            <strong id="ticket-total-amount">$0</strong>
                        </div>

                        <div class="query-summary-item warning">
                            <span>等待交票</span>
                            <strong id="ticket-pending-count">0 筆</strong>
                        </div>

                        <div class="query-summary-item blue">
                            <span>已寄放前台</span>
                            <strong id="ticket-sent-count">0 筆</strong>
                        </div>
                    </div>

                    <div id="ticket-result-list" class="consignment-record-list"></div>
                </section>
            </section>

        </section>

    </main>

    <footer class="page-footer">
        © 2026 NTUCO All Rights Reserved.
    </footer>

    <div id="front-loading-overlay" class="orders-loading-overlay hidden">
        <div class="orders-loading-card">
            <div class="orders-loading-spinner"></div>
            <div id="front-loading-text">處理中...</div>
        </div>
    </div>

    <script>
        const loginPanel = document.getElementById("front-login-panel");
        const appPanel = document.getElementById("front-app-panel");
        const loginForm = document.getElementById("front-login-form");
        const frontPasswordInput = document.getElementById("front-password");
        const loginMessage = document.getElementById("front-login-message");

        const frontModeButtons = document.querySelectorAll("[data-front-mode]");
        const frontdeskPanel = document.getElementById("frontdesk-panel");
        const ticketPanel = document.getElementById("ticket-panel");

        const frontdeskConcertCode = document.getElementById("frontdesk-concert-code");
        const frontdeskLoadBtn = document.getElementById("frontdesk-load-btn");
        const frontdeskKeyword = document.getElementById("frontdesk-keyword");
        const frontdeskSearchBtn = document.getElementById("frontdesk-search-btn");
        const frontdeskResultCard = document.getElementById("frontdesk-result-card");
        const frontdeskResultTitle = document.getElementById("frontdesk-result-title");
        const frontdeskResultNote = document.getElementById("frontdesk-result-note");
        const frontdeskResultList = document.getElementById("frontdesk-result-list");
        const frontdeskListAllBtn = document.getElementById("frontdesk-list-all-btn");
        const frontdeskListUnpickedBtn = document.getElementById("frontdesk-list-unpicked-btn");
        const frontdeskListPickedBtn = document.getElementById("frontdesk-list-picked-btn");

        const frontdeskSummaryGrid = document.getElementById("frontdesk-summary-grid");
        const frontdeskRecordCount = document.getElementById("frontdesk-record-count");
        const frontdeskTicketCount = document.getElementById("frontdesk-ticket-count");
        const frontdeskTotalAmount = document.getElementById("frontdesk-total-amount");
        const frontdeskCollectedAmount = document.getElementById("frontdesk-collected-amount");
        const frontdeskPendingCount = document.getElementById("frontdesk-pending-count");
        const frontdeskPickedCount = document.getElementById("frontdesk-picked-count");

        const ticketConcertCode = document.getElementById("ticket-concert-code");
        const ticketOwnerKeyword = document.getElementById("ticket-owner-keyword");
        const ticketLoadBtn = document.getElementById("ticket-load-btn");
        const ticketResultCard = document.getElementById("ticket-result-card");
        const ticketResultTitle = document.getElementById("ticket-result-title");
        const ticketResultNote = document.getElementById("ticket-result-note");
        const ticketResultList = document.getElementById("ticket-result-list");

        const ticketSummaryGrid = document.getElementById("ticket-summary-grid");
        const ticketRecordCount = document.getElementById("ticket-record-count");
        const ticketTicketCount = document.getElementById("ticket-ticket-count");
        const ticketTotalAmount = document.getElementById("ticket-total-amount");
        const ticketPendingCount = document.getElementById("ticket-pending-count");
        const ticketSentCount = document.getElementById("ticket-sent-count");

        const loadingOverlay = document.getElementById("front-loading-overlay");
        const loadingText = document.getElementById("front-loading-text");

        const concertLabels = {
            tp: "台北場",
            kh: "高雄場",
        };

        let frontPassword = sessionStorage.getItem("front_password") || "";
        let frontdeskRecordsCache = [];
        let ticketRecordsCache = [];
        let frontdeskLoadedConcertCode = "";
        let frontdeskCurrentFilter = "all";

        if (frontPassword) {
            loginPanel.classList.add("hidden");
            appPanel.classList.remove("hidden");
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const password = frontPasswordInput.value.trim();

            if (!password) {
                showLoginMessage("請輸入前台密碼");
                return;
            }

            showLoading("登入中...");

            try {
                const response = await fetch("/api/consignment-front/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        front_password: password,
                    }),
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    showLoginMessage(result.message || "登入失敗");
                    return;
                }

                frontPassword = password;
                sessionStorage.setItem("front_password", password);

                loginPanel.classList.add("hidden");
                appPanel.classList.remove("hidden");

            } catch (error) {
                showLoginMessage("網路或伺服器錯誤，請稍後再試");
            } finally {
                hideLoading();
            }
        });

        frontModeButtons.forEach((button) => {
            button.addEventListener("click", () => {
                const mode = button.dataset.frontMode;

                frontModeButtons.forEach((btn) => btn.classList.remove("active"));
                button.classList.add("active");

                frontdeskPanel.classList.toggle("active", mode === "frontdesk");
                ticketPanel.classList.toggle("active", mode === "ticket");
            });
        });

        frontdeskLoadBtn.addEventListener("click", loadFrontdeskRecords);
        frontdeskSearchBtn.addEventListener("click", searchFrontdeskRecords);

        frontdeskListAllBtn.addEventListener("click", () => {
            setFrontdeskFilter("all");
            renderFrontdeskRecordsWithCurrentFilter();
        });

        frontdeskListUnpickedBtn.addEventListener("click", () => {
            setFrontdeskFilter("unpicked");
            renderFrontdeskRecordsWithCurrentFilter();
        });

        frontdeskListPickedBtn.addEventListener("click", () => {
            setFrontdeskFilter("picked");
            renderFrontdeskRecordsWithCurrentFilter();
        });

        frontdeskConcertCode.addEventListener("change", () => {
            frontdeskRecordsCache = [];
            frontdeskLoadedConcertCode = "";
            frontdeskCurrentFilter = "all";
            frontdeskResultCard.classList.add("hidden");
            frontdeskKeyword.value = "";
            setFrontdeskFilter("all");
        });

        frontdeskKeyword.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                searchFrontdeskRecords();
            }
        });

        ticketLoadBtn.addEventListener("click", loadTicketRecords);

        ticketOwnerKeyword.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                loadTicketRecords();
            }
        });

        async function loadFrontdeskRecords() {
            const concertCode = frontdeskConcertCode.value;

            showLoading("載入本場資料中...");

            try {
                const result = await postJson("/api/consignment-front/all", {
                    concert_code: concertCode,
                    keyword: "",
                });

                if (!result.success) {
                    showFrontdeskEmpty(result.message || "載入失敗");
                    return;
                }

                frontdeskRecordsCache = result.records || [];
                frontdeskLoadedConcertCode = concertCode;
                frontdeskCurrentFilter = "all";
                setFrontdeskFilter("all");

                frontdeskResultCard.classList.remove("hidden");
                frontdeskResultTitle.textContent = "前台資料已載入";
                frontdeskResultNote.textContent =
                    `${concertLabels[concertCode] || concertCode}｜已載入 ${frontdeskRecordsCache.length} 筆。可列出資料或輸入編號 / 姓名快速查詢。`;

                frontdeskResultList.innerHTML = `
                    <div class="empty-state consignment-empty-state">
                        已載入 ${frontdeskRecordsCache.length} 筆資料。可按「列出所有 / 未取 / 已取」，或直接輸入取票編號查詢。
                    </div>
                `;

                frontdeskKeyword.focus();

            } catch (error) {
                showFrontdeskEmpty(error.message || "網路或伺服器錯誤，請稍後再試");
            } finally {
                hideLoading();
            }
        }

        async function searchFrontdeskRecords() {
            const concertCode = frontdeskConcertCode.value;
            const keyword = frontdeskKeyword.value.trim();

            if (!keyword) {
                showFrontdeskEmpty("請輸入取票編號、取票人姓名或寄票人姓名");
                return;
            }

            if (
                !frontdeskRecordsCache.length ||
                frontdeskLoadedConcertCode !== concertCode
            ) {
                await loadFrontdeskRecords();
            }

            setFrontdeskFilter("all");

            const matchedRecords = searchFrontdeskRecordsFromCache(
                frontdeskRecordsCache,
                keyword,
                concertCode
            );

            frontdeskResultTitle.textContent = "前台查詢結果";
            frontdeskResultNote.textContent =
                `${concertLabels[concertCode] || concertCode}｜查詢「${keyword}」共 ${matchedRecords.length} 筆資料`;

            renderFrontdeskRecords(matchedRecords);
        }

        function setFrontdeskFilter(filter) {
            frontdeskCurrentFilter = filter;

            frontdeskListAllBtn.classList.toggle("active", filter === "all");
            frontdeskListUnpickedBtn.classList.toggle("active", filter === "unpicked");
            frontdeskListPickedBtn.classList.toggle("active", filter === "picked");
        }

        function applyFrontdeskFilter(records) {
            if (frontdeskCurrentFilter === "unpicked") {
                return records.filter((record) => {
                    return (record.pickup_status || "pending") !== "picked_up";
                });
            }

            if (frontdeskCurrentFilter === "picked") {
                return records.filter((record) => {
                    return (record.pickup_status || "pending") === "picked_up";
                });
            }

            return records;
        }

        function renderFrontdeskRecordsWithCurrentFilter() {
            const concertCode = frontdeskConcertCode.value;

            if (
                !frontdeskRecordsCache.length ||
                frontdeskLoadedConcertCode !== concertCode
            ) {
                frontdeskResultCard.classList.remove("hidden");
                frontdeskResultTitle.textContent = "尚未載入資料";
                frontdeskResultNote.textContent = "請先按「載入與刷新資料」。";
                frontdeskResultList.innerHTML = `
                    <div class="empty-state consignment-empty-state">
                        請先載入本場資料。
                    </div>
                `;
                return;
            }

            frontdeskKeyword.value = "";

            const records = applyFrontdeskFilter(frontdeskRecordsCache);

            frontdeskResultTitle.textContent = "前台資料列表";

            const filterLabel = {
                all: "全部",
                unpicked: "未取",
                picked: "已取",
            }[frontdeskCurrentFilter] || "全部";

            frontdeskResultNote.textContent =
                `${concertLabels[concertCode] || concertCode}｜${filterLabel}｜共 ${records.length} 筆資料`;

            renderFrontdeskRecords(records);
        }

        function searchFrontdeskRecordsFromCache(records, keyword, concertCode) {
            const normalizedKeyword = normalizeSearchText(keyword);
            const lookupId = normalizeLookupId(keyword, concertCode);
            const normalizedLookupId = normalizeSearchText(lookupId);

            return records.filter((record) => {
                const consignmentId = normalizeSearchText(record.consignment_id);
                const audienceName = normalizeSearchText(record.audience_name);
                const ownerName = normalizeSearchText(record.owner_name);

                if (normalizedLookupId && consignmentId === normalizedLookupId) {
                    return true;
                }

                if (normalizedKeyword && audienceName.includes(normalizedKeyword)) {
                    return true;
                }

                if (normalizedKeyword && ownerName.includes(normalizedKeyword)) {
                    return true;
                }

                return false;
            });
        }

        function normalizeLookupId(value, concertCode) {
            const raw = String(value || "").trim().toUpperCase();

            if (!raw) {
                return "";
            }

            const prefix = concertCode === "kh" ? "KH" : "TP";

            if (raw.startsWith(prefix)) {
                const numberPart = raw.replace(prefix, "");

                if (numberPart && /^\d+$/.test(numberPart)) {
                    return `${prefix}${String(Number(numberPart)).padStart(4, "0")}`;
                }

                return raw;
            }

            if (/^\d+$/.test(raw)) {
                return `${prefix}${String(Number(raw)).padStart(4, "0")}`;
            }

            return "";
        }

        function normalizeSearchText(value) {
            return String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "");
        }

        async function loadTicketRecords() {
            const concertCode = ticketConcertCode.value;
            const keyword = ticketOwnerKeyword.value.trim();

            showLoading("載入中...");

            try {
                const result = await postJson("/api/consignment-front/all", {
                    concert_code: concertCode,
                    keyword,
                });

                if (!result.success) {
                    showTicketEmpty(result.message || "載入失敗");
                    return;
                }

                ticketRecordsCache = result.records || [];

                ticketResultTitle.textContent = "票務資料";
                ticketResultNote.textContent = `${concertLabels[concertCode] || concertCode}｜共 ${ticketRecordsCache.length} 筆資料`;

                renderTicketRecords(ticketRecordsCache);

            } catch (error) {
                showTicketEmpty(error.message || "網路或伺服器錯誤，請稍後再試");
            } finally {
                hideLoading();
            }
        }

        function renderFrontdeskRecords(records) {
            frontdeskResultCard.classList.remove("hidden");
            frontdeskResultList.innerHTML = "";

            renderFrontdeskSummary(records);

            if (!records.length) {
                frontdeskResultList.innerHTML = `
                    <div class="empty-state consignment-empty-state">查無資料</div>
                `;
                return;
            }

            records.forEach((record) => {
                frontdeskResultList.appendChild(createFrontRecordCard(record, {
                    actionType: "picked_up",
                }));
            });
        }

        function renderTicketRecords(records) {
            ticketResultCard.classList.remove("hidden");
            ticketResultList.innerHTML = "";

            renderTicketSummary(records);

            if (!records.length) {
                ticketResultList.innerHTML = `
                    <div class="empty-state consignment-empty-state">查無資料</div>
                `;
                return;
            }

            records.forEach((record) => {
                ticketResultList.appendChild(createFrontRecordCard(record, {
                    actionType: "sent",
                }));
            });
        }

        function renderFrontdeskSummary(records) {
            const summary = getRecordsSummary(records);

            frontdeskSummaryGrid.classList.remove("hidden");
            frontdeskRecordCount.textContent = `${summary.count} 筆`;
            frontdeskTicketCount.textContent = `${summary.ticketCount} 張`;
            frontdeskTotalAmount.textContent = `$${summary.totalAmount.toLocaleString("zh-TW")}`;
            frontdeskCollectedAmount.textContent = `$${summary.collectedAmount.toLocaleString("zh-TW")}`;
            frontdeskPendingCount.textContent = `${summary.notPickedCount} 筆`;
            frontdeskPickedCount.textContent = `${summary.pickedCount} 筆`;
        }

        function renderTicketSummary(records) {
            const summary = getRecordsSummary(records);

            ticketSummaryGrid.classList.remove("hidden");
            ticketRecordCount.textContent = `${summary.count} 筆`;
            ticketTicketCount.textContent = `${summary.ticketCount} 張`;
            ticketTotalAmount.textContent = `$${summary.totalAmount.toLocaleString("zh-TW")}`;
            ticketPendingCount.textContent = `${summary.pendingCount} 筆`;
            ticketSentCount.textContent = `${summary.sentCount} 筆`;
        }

        function getRecordsSummary(records) {
            let count = records.length;
            let ticketCount = 0;
            let totalAmount = 0;
            let collectedAmount = 0;
            let pendingCount = 0;
            let sentCount = 0;
            let pickedCount = 0;
            let notPickedCount = 0;

            records.forEach((record) => {
                const quantity = Number(record.quantity || 0);
                const price = Number(record.price || 0);
                const pickupStatus = record.pickup_status || "pending";
                const paymentStatus = record.payment_status || "unpaid";

                ticketCount += quantity;
                totalAmount += price;

                if (pickupStatus === "picked_up") {
                    pickedCount += 1;

                    if (paymentStatus === "paid") {
                        collectedAmount += price;
                    }
                } else {
                    notPickedCount += 1;
                }

                if (pickupStatus === "pending") {
                    pendingCount += 1;
                }

                if (pickupStatus === "sent") {
                    sentCount += 1;
                }
            });

            return {
                count,
                ticketCount,
                totalAmount,
                collectedAmount,
                pendingCount,
                sentCount,
                pickedCount,
                notPickedCount,
            };
        }

        function createFrontRecordCard(record, options = {}) {
            const actionType = options.actionType;

            if (actionType === "picked_up") {
                return createFrontdeskFastCard(record);
            }

            return createTicketRecordCard(record);
        }

        function createFrontdeskFastCard(record) {
            const card = document.createElement("article");
            card.className = "front-fast-card";

            const price = Number(record.price || 0);
            const quantity = Number(record.quantity || 0);
            const statusText = consignmentStatusLabel(record);
            const statusClass = consignmentStatusClass(record);
            const concertText = concertLabels[record.concert_code] || record.concert_code || "-";

            const amountText = price > 0
                ? `$${price.toLocaleString("zh-TW")}`
                : "無需付款";

            const noteText = record.note
                ? escapeHtml(record.note)
                : "無備註";

            const alreadyPickedWarning = record.pickup_status === "picked_up"
                ? `
                    <div class="front-fast-already-picked-warning">
                        ⚠️ 此信封已完成取票，請勿重複給票
                    </div>
                `
                : "";

            const canPickUp = record.pickup_status !== "picked_up";   

            card.innerHTML = `
                ${alreadyPickedWarning}
                
                <div class="front-fast-main with-id">
                    <div class="front-fast-id-block">
                        <span class="front-fast-label">取票編號</span>
                        <strong class="front-fast-id">${escapeHtml(record.consignment_id)}</strong>
                    </div>

                    <div class="front-fast-name-block">
                        <span class="front-fast-label">聽眾名字</span>
                        <strong class="front-fast-name">${escapeHtml(record.audience_name)}</strong>
                    </div>

                    <div class="front-fast-amount-block">
                        <span class="front-fast-label">前台應收金額</span>
                        <strong class="front-fast-amount">${amountText}</strong>
                    </div>

                    <div class="front-fast-note-block">
                        <span class="front-fast-label">備註</span>
                        <strong class="front-fast-note">${noteText}</strong>
                    </div>

                    <div class="front-fast-action-block">
                        ${canPickUp ? `
                            <button class="front-fast-pickup-btn" type="button">
                                完成付款且完成取票
                            </button>
                        ` : `
                            <button class="front-fast-pickup-btn done" type="button" disabled>
                                已完成取票
                            </button>
                        `}
                    </div>
                </div>

                <div class="front-fast-meta">
                    <span>${concertText}</span>
                    <span>寄票人：${escapeHtml(record.owner_name || "-")}</span>
                    <span>${quantity} 張</span>
                    <span class="record-status-pill ${statusClass}">
                        ${escapeHtml(statusText)}
                    </span>
                </div>
            `;

            const pickupBtn = card.querySelector(".front-fast-pickup-btn:not(.done)");

            if (pickupBtn) {
                pickupBtn.addEventListener("click", () => {
                    markPaidAndPickedUp(record);
                });
            }

            return card;
        }

        function createTicketRecordCard(record) {
            const card = document.createElement("article");
            card.className = "consignment-record-card compact front-record-card";

            const price = Number(record.price || 0);
            const quantity = Number(record.quantity || 0);
            const statusText = consignmentStatusLabel(record);
            const statusClass = consignmentStatusClass(record);
            const concertText = concertLabels[record.concert_code] || record.concert_code || "-";

            const amountText = price > 0
                ? `$${price.toLocaleString("zh-TW")}`
                : "無需付款";

            const noteText = record.note
                ? `｜備註：${escapeHtml(record.note)}`
                : "";

            const actionButton = record.pickup_status === "pending"
                ? `
                    <button class="front-action-btn sent-btn" type="button">
                        已寄放前台
                    </button>
                `
                : "";

            card.innerHTML = `
                <div class="compact-record-top">
                    <strong class="consignment-id-pill">${escapeHtml(record.consignment_id)}</strong>

                    <div class="compact-record-main">
                        <div class="compact-record-name">
                            ${escapeHtml(record.audience_name)}
                        </div>

                        <div class="compact-record-sub">
                            ${concertText}
                            ｜寄票人：${escapeHtml(record.owner_name || "-")}
                            ｜${quantity} 張
                            ｜${amountText}
                            ${noteText}
                        </div>
                    </div>

                    <div class="compact-record-actions">
                        <span class="record-status-pill ${statusClass}">
                            ${escapeHtml(statusText)}
                        </span>

                        ${actionButton}
                    </div>
                </div>
            `;

            const sentBtn = card.querySelector(".sent-btn");

            if (sentBtn) {
                sentBtn.addEventListener("click", () => {
                    markSentToFront(record);
                });
            }

            return card;
        }

        async function markPaidAndPickedUp(record) {
            const price = Number(record.price || 0);
            const amountText = price > 0
                ? `$${price.toLocaleString("zh-TW")}`
                : "無需付款";

            const confirmed = window.confirm(
                `確認完成 ${record.consignment_id} 的付款與取票嗎？\n\n` +
                `取票人：${record.audience_name}\n` +
                `寄票人：${record.owner_name}\n` +
                `金額：${amountText}\n\n` +
                `確認後狀態會更新為 paid / picked_up。`
            );

            if (!confirmed) {
                return;
            }

            showLoading("更新中...");

            try {
                const result = await patchJson("/api/consignment-front/paid-picked-up", {
                    concert_code: record.concert_code,
                    consignment_id: record.consignment_id,
                });

                if (!result.success) {
                    alert(result.message || "更新失敗");
                    return;
                }

                updateRecordInCache(frontdeskRecordsCache, record.consignment_id, {
                    payment_status: price > 0 ? "paid" : "free",
                    pickup_status: "picked_up",
                });

                const keyword = frontdeskKeyword.value.trim();

                if (keyword) {
                    const matchedRecords = searchFrontdeskRecordsFromCache(
                        frontdeskRecordsCache,
                        keyword,
                        record.concert_code
                    );

                    renderFrontdeskRecords(matchedRecords);
                } else {
                    renderFrontdeskRecordsWithCurrentFilter();
                }

                frontdeskKeyword.value = "";
                frontdeskKeyword.focus();

            } catch (error) {
                alert(error.message || "網路或伺服器錯誤，請稍後再試");
            } finally {
                hideLoading();
            }
        }

        async function markSentToFront(record) {
            const confirmed = window.confirm(
                `確認 ${record.consignment_id} 已寄放前台嗎？\n\n` +
                `取票人：${record.audience_name}\n` +
                `寄票人：${record.owner_name}\n\n` +
                `請確認已收到實體票券與信封後再更新。`
            );

            if (!confirmed) {
                return;
            }

            showLoading("更新中...");

            try {
                const result = await patchJson("/api/consignment-front/sent", {
                    concert_code: record.concert_code,
                    consignment_id: record.consignment_id,
                });

                if (!result.success) {
                    alert(result.message || "更新失敗");
                    return;
                }

                updateRecordInCache(ticketRecordsCache, record.consignment_id, {
                    pickup_status: "sent",
                });

                renderTicketRecords(ticketRecordsCache);

            } catch (error) {
                alert(error.message || "網路或伺服器錯誤，請稍後再試");
            } finally {
                hideLoading();
            }
        }

        function updateRecordInCache(records, consignmentId, updates) {
            records.forEach((record) => {
                if (record.consignment_id === consignmentId) {
                    Object.assign(record, updates);
                }
            });
        }

        async function postJson(url, payload) {
            return requestJson(url, "POST", payload);
        }

        async function patchJson(url, payload) {
            return requestJson(url, "PATCH", payload);
        }

        async function requestJson(url, method, payload) {
            const response = await fetch(url, {
                method,
                headers: {
                    "Content-Type": "application/json",
                    "X-Front-Password": frontPassword,
                },
                body: JSON.stringify({
                    ...payload,
                    front_password: frontPassword,
                }),
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.message || "操作失敗");
            }

            return result;
        }

        function showFrontdeskEmpty(message) {
            frontdeskResultCard.classList.remove("hidden");
            frontdeskSummaryGrid.classList.add("hidden");
            frontdeskResultTitle.textContent = "查詢結果";
            frontdeskResultNote.textContent = message;
            frontdeskResultList.innerHTML = `
                <div class="empty-state consignment-empty-state">${escapeHtml(message)}</div>
            `;
        }

        function showTicketEmpty(message) {
            ticketResultCard.classList.remove("hidden");
            ticketSummaryGrid.classList.add("hidden");
            ticketResultTitle.textContent = "票務資料";
            ticketResultNote.textContent = message;
            ticketResultList.innerHTML = `
                <div class="empty-state consignment-empty-state">${escapeHtml(message)}</div>
            `;
        }

        function showLoginMessage(message) {
            loginMessage.textContent = message;
            loginMessage.classList.remove("hidden");
        }

        function showLoading(message = "處理中...") {
            loadingText.textContent = message;
            loadingOverlay.classList.remove("hidden");
        }

        function hideLoading() {
            loadingOverlay.classList.add("hidden");
        }

        function consignmentStatusLabel(record) {
            const price = Number(record.price || 0);
            const pickupStatus = record.pickup_status || "pending";
            const paymentStatus = record.payment_status || "unpaid";

            const amountText = price > 0
                ? `$${price.toLocaleString("zh-TW")}`
                : "";

            let paymentText = "";

            if (paymentStatus === "free" || price === 0) {
                paymentText = "無需付款";
            } else if (paymentStatus === "paid") {
                paymentText = `已付款 ${amountText}`;
            } else {
                paymentText = `需付款 ${amountText}`;
            }

            let pickupText = "";

            if (pickupStatus === "picked_up") {
                pickupText = "已取票";
            } else if (pickupStatus === "sent") {
                pickupText = "已寄放前台";
            } else {
                pickupText = "等待交票";
            }

            return `${paymentText}｜${pickupText}`;
        }

        function consignmentStatusClass(record) {
            const pickupStatus = record.pickup_status || "pending";
            const paymentStatus = record.payment_status || "unpaid";

            if (pickupStatus === "picked_up") {
                return "done";
            }

            if (pickupStatus === "sent") {
                return "open";
            }

            if (paymentStatus === "free") {
                return "free-pending";
            }

            return "closed";
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }
    </script>
</body>
